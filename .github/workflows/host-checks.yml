name: host-checks

on:
  push:
  pull_request:

jobs:
  swift-tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Run host tests
        run: ./scripts/run_host_tests.sh
